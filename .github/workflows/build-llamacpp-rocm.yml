name: Build llamacpp-strix-halo + ROCm

# Fork of lemonade-sdk/llamacpp-rocm, trimmed to a single
# Ubuntu / gfx1151 build pointed at chrismcmacken/llamacpp-strix-halo
# (upstream llama.cpp master + the gfx1151 prefill patch). Produces the
# same self-contained, RPATH=$ORIGIN package format as upstream Lemonade
# so it can drop straight into the homelab `llamacpp-rocm` Ansible role.
#
# Build/bundle/rpath steps are kept verbatim from upstream's build-ubuntu
# job — the only substantive change is the clone source.

on:
  workflow_dispatch:
    inputs:
      rocm_version:
        description: 'ROCm version (e.g. 7.13.0a20260512) or "latest"'
        required: false
        default: 'latest'
      llamacpp_ref:
        description: 'Ref of chrismcmacken/llamacpp-strix-halo to build'
        required: false
        default: 'master'
      create_release:
        description: 'Create a GitHub release after a successful build'
        required: false
        default: true
        type: boolean
  # Nightly cadence — enabled 2026-05-15 after benchmarking confirmed the
  # patched build is +6-7% prefill over stock Lemonade at both single-stream
  # configs we run (peak/deployed). Bench: homelab/local-ai/benchmarks.md.
  schedule:
    - cron: '0 14 * * *'   # 1h after Lemonade's 13:00 UTC build

jobs:
  build-ubuntu:
    runs-on: ubuntu-22.04
    outputs:
      rocm_version: ${{ steps.set-outputs.outputs.rocm_version }}
      llamacpp_commit_hash: ${{ steps.set-outputs.outputs.llamacpp_commit_hash }}
    steps:
      - name: Free disk space
        run: curl -fsSL https://raw.githubusercontent.com/kou/arrow/e49d8ae15583ceff03237571569099a6ad62be32/ci/scripts/util_free_space.sh | bash

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clean up existing directories (safety precaution)
        run: |
          [ -d "llama.cpp" ] && rm -rf llama.cpp || true
          [ -d "/opt/rocm" ] && sudo rm -rf /opt/rocm || true
          [ -f "rocm.tar.gz" ] && rm -f rocm.tar.gz || true
          echo "Cleanup completed"

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake ninja-build unzip curl patchelf
          cmake --version
          ninja --version

      - name: Download and extract ROCm directly to /opt/rocm
        env:
          ROCM_VERSION_INPUT: ${{ inputs.rocm_version }}
          GFX_TARGET: gfx1151
        run: |
          rocm_version="${ROCM_VERSION_INPUT:-latest}"
          s3_target="$GFX_TARGET"

          if [ "$rocm_version" = "latest" ]; then
            echo "Auto-detecting latest ROCm version for target: $s3_target"
            s3_response=$(curl -s "https://therock-nightly-tarball.s3.amazonaws.com/?prefix=therock-dist-linux-${s3_target}-7")
            files=$(echo "$s3_response" | grep -oP '(?<=<Key>)[^<]*' | grep "therock-dist-linux-${s3_target}-")

            latest_file=""
            latest_major=0; latest_minor=0; latest_patch=0; latest_rc=0; latest_is_alpha=false
            while IFS= read -r file; do
              if [[ "$file" =~ therock-dist-linux-${s3_target}-.*?([0-9]+\.[0-9]+\.[0-9]+(a|rc)[0-9]+)\.tar\.gz ]]; then
                version="${BASH_REMATCH[1]}"
                major=$(echo "$version" | cut -d. -f1)
                minor=$(echo "$version" | cut -d. -f2)
                patch=$(echo "$version" | cut -d. -f3 | sed 's/\(a\|rc\).*//')
                rc=$(echo "$version" | sed 's/.*\(a\|rc\)//')
                is_alpha=false
                [[ "$version" =~ a ]] && is_alpha=true
                is_newer=false
                if [ "$major" -gt "$latest_major" ]; then
                  is_newer=true
                elif [ "$major" -eq "$latest_major" ] && [ "$minor" -gt "$latest_minor" ]; then
                  is_newer=true
                elif [ "$major" -eq "$latest_major" ] && [ "$minor" -eq "$latest_minor" ] && [ "$patch" -gt "$latest_patch" ]; then
                  is_newer=true
                elif [ "$major" -eq "$latest_major" ] && [ "$minor" -eq "$latest_minor" ] && [ "$patch" -eq "$latest_patch" ]; then
                  if [ "$is_alpha" = true ] && [ "$latest_is_alpha" = false ]; then
                    is_newer=true
                  elif [ "$is_alpha" = "$latest_is_alpha" ] && [ "$rc" -gt "$latest_rc" ]; then
                    is_newer=true
                  fi
                fi
                if [ "$is_newer" = true ]; then
                  latest_file="$file"; latest_major="$major"; latest_minor="$minor"
                  latest_patch="$patch"; latest_rc="$rc"; latest_is_alpha="$is_alpha"
                fi
              fi
            done <<< "$files"

            echo "Found latest file: $latest_file"
            if [[ "$latest_file" =~ therock-dist-linux-${s3_target}-.*?([0-9]+\.[0-9]+\.[0-9]+(a|rc)[0-9]+)\.tar\.gz ]]; then
              rocm_version="${BASH_REMATCH[1]}"
              echo "Detected latest ROCm version: $rocm_version"
            else
              echo "Failed to extract ROCm version from: $latest_file"
              exit 1
            fi
            rocm_url="https://therock-nightly-tarball.s3.amazonaws.com/$latest_file"
          else
            rocm_url="https://therock-nightly-tarball.s3.amazonaws.com/therock-dist-linux-${s3_target}-${rocm_version}.tar.gz"
          fi

          echo "DETECTED_ROCM_VERSION=$rocm_version" >> "$GITHUB_ENV"
          echo "Streaming ROCm from: $rocm_url"
          sudo mkdir -p /opt/rocm
          curl -sL "$rocm_url" | sudo tar --use-compress-program=gzip -xf - -C /opt/rocm --strip-components=1

      - name: Set ROCm environment variables
        run: |
          {
            echo "HIP_PATH=/opt/rocm"
            echo "ROCM_PATH=/opt/rocm"
            echo "HIP_PLATFORM=amd"
            echo "HIP_CLANG_PATH=/opt/rocm/llvm/bin"
            echo "HIP_INCLUDE_PATH=/opt/rocm/include"
            echo "HIP_LIB_PATH=/opt/rocm/lib"
            echo "HIP_DEVICE_LIB_PATH=/opt/rocm/lib/llvm/amdgcn/bitcode"
            echo "LD_LIBRARY_PATH=/opt/rocm/lib:/opt/rocm/lib64:/opt/rocm/llvm/lib:${LD_LIBRARY_PATH:-}"
            echo "LIBRARY_PATH=/opt/rocm/lib:/opt/rocm/lib64:${LIBRARY_PATH:-}"
            echo "CPATH=/opt/rocm/include:${CPATH:-}"
            echo "PKG_CONFIG_PATH=/opt/rocm/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
          } >> "$GITHUB_ENV"
          echo "/opt/rocm/bin:/opt/rocm/llvm/bin" >> "$GITHUB_PATH"

      - name: Clone llamacpp-strix-halo
        env:
          LLAMACPP_REPO: https://github.com/chrismcmacken/llamacpp-strix-halo.git
          LLAMACPP_REF: ${{ inputs.llamacpp_ref }}
        run: |
          ref="${LLAMACPP_REF:-master}"
          echo "Cloning $LLAMACPP_REPO @ $ref"
          git clone --depth 1 --single-branch --branch "$ref" "$LLAMACPP_REPO" llama.cpp
          cd llama.cpp
          commit_hash=$(git rev-parse --short=5 HEAD)
          echo "LLAMACPP_COMMIT_HASH=$commit_hash" >> "$GITHUB_ENV"
          echo "llamacpp-strix-halo commit hash: $commit_hash"
          git log --oneline -1

      - name: Build llama.cpp + ROCm
        env:
          GFX_TARGET: gfx1151
        run: |
          cd llama.cpp
          mkdir build && cd build
          # cmake flags kept verbatim from upstream lemonade-sdk/llamacpp-rocm
          # build-ubuntu job — this is the "same package" contract.
          cmake .. -G Ninja \
            -DCMAKE_C_COMPILER=/opt/rocm/llvm/bin/clang \
            -DCMAKE_CXX_COMPILER=/opt/rocm/llvm/bin/clang++ \
            -DCMAKE_CXX_FLAGS="-I/opt/rocm/include" \
            -DCMAKE_CROSSCOMPILING=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DGPU_TARGETS="$GFX_TARGET" \
            -DBUILD_SHARED_LIBS=ON \
            -DLLAMA_BUILD_TESTS=OFF \
            -DGGML_HIP=ON \
            -DGGML_OPENMP=OFF \
            -DGGML_CUDA_FORCE_CUBLAS=OFF \
            -DGGML_RPC=ON \
            -DGGML_HIP_ROCWMMA_FATTN=OFF \
            -DLLAMA_BUILD_BORINGSSL=ON \
            -DGGML_NATIVE=OFF \
            -DGGML_STATIC=OFF \
            -DCMAKE_SYSTEM_NAME=Linux
          cmake --build . -j "$(nproc)"

      - name: Copy ROCm core libs to build directory
        run: |
          build_bin_path="llama.cpp/build/bin"

          rocblas_lib_path="/opt/rocm/lib/rocblas/library"
          if [ -d "$rocblas_lib_path" ]; then
            mkdir -p "$build_bin_path/rocblas"
            cp -r "$rocblas_lib_path" "$build_bin_path/rocblas/"
            echo "Copied rocblas/library"
          else
            echo "Warning: $rocblas_lib_path not found"
          fi

          hipblaslt_lib_path="/opt/rocm/lib/hipblaslt/library"
          if [ -d "$hipblaslt_lib_path" ]; then
            mkdir -p "$build_bin_path/hipblaslt"
            cp -r "$hipblaslt_lib_path" "$build_bin_path/hipblaslt/"
            echo "Copied hipblaslt/library"
          else
            echo "Warning: $hipblaslt_lib_path not found"
          fi

          # Required ROCm runtime libraries. If artifacts change, regenerate with:
          #   utils/gather_required_libs.py --rocm-dir /opt/rocm --dest-dir llama.cpp/build/bin
          for lib in \
            /opt/rocm/lib/libhipblas.so* \
            /opt/rocm/lib/librocblas.so* \
            /opt/rocm/lib/libamdhip64.so* \
            /opt/rocm/lib/librocsolver.so* \
            /opt/rocm/lib/libroctx64.so* \
            /opt/rocm/lib/libhipblaslt.so* \
            /opt/rocm/lib/rocm_sysdeps/lib/librocm_sysdeps_liblzma.so* \
            /opt/rocm/lib/librocprofiler-register.so* \
            /opt/rocm/lib/libamd_comgr.so* \
            /opt/rocm/lib/libamd_comgr_loader.so* \
            /opt/rocm/lib/libhsa-runtime64.so* \
            /opt/rocm/lib/rocm_sysdeps/lib/librocm_sysdeps_numa.so* \
            /opt/rocm/lib/librocroller.so* \
            /opt/rocm/lib/librocm_kpack.so* \
            /opt/rocm/lib/rocm_sysdeps/lib/librocm_sysdeps_z.so* \
            /opt/rocm/lib/rocm_sysdeps/lib/librocm_sysdeps_zstd.so* \
            /opt/rocm/lib/llvm/lib/libLLVM.so* \
            /opt/rocm/lib/llvm/lib/libclang-cpp.so* \
            /opt/rocm/lib/rocm_sysdeps/lib/librocm_sysdeps_elf.so* \
            /opt/rocm/lib/rocm_sysdeps/lib/librocm_sysdeps_drm.so* \
            /opt/rocm/lib/rocm_sysdeps/lib/librocm_sysdeps_drm_amdgpu.so* \
            /opt/rocm/lib/rocm_sysdeps/lib/librocm_sysdeps_bz2.so* ; do
            cp -v $lib "$build_bin_path/" 2>/dev/null || echo "skip: $lib"
          done
          echo "Finished copying ROCm libraries"

      - name: Set RPATH for portable distribution
        run: |
          cd llama.cpp/build/bin
          for file in *.so* llama-*; do
            [ -f "$file" ] && [ ! -L "$file" ] && patchelf --set-rpath '$ORIGIN' "$file" 2>/dev/null || true
          done

      - name: List build artifacts
        run: ls -la llama.cpp/build/bin

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: llama-ubuntu-rocm-gfx1151-x64
          path: llama.cpp/build/bin/
          retention-days: 30

      - name: Set job outputs
        id: set-outputs
        env:
          ROCM_VERSION_INPUT: ${{ inputs.rocm_version }}
        run: |
          rocm_version="${DETECTED_ROCM_VERSION:-${ROCM_VERSION_INPUT:-latest}}"
          echo "rocm_version=$rocm_version" >> "$GITHUB_OUTPUT"
          echo "llamacpp_commit_hash=${LLAMACPP_COMMIT_HASH}" >> "$GITHUB_OUTPUT"

  create-release:
    needs: build-ubuntu
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    if: >-
      always() &&
      needs.build-ubuntu.result == 'success' &&
      github.event_name == 'workflow_dispatch' &&
      (inputs.create_release == true || inputs.create_release == null)
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./all-artifacts

      - name: Generate release tag
        id: tag
        env:
          LLAMACPP_COMMIT_HASH: ${{ needs.build-ubuntu.outputs.llamacpp_commit_hash }}
        run: |
          tag="sh-$(date -u +%Y%m%d)-${LLAMACPP_COMMIT_HASH}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Release tag: $tag"

      - name: Create archive
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          artifact_dir="./all-artifacts/llama-ubuntu-rocm-gfx1151-x64"
          archive="llama-${RELEASE_TAG}-ubuntu-rocm-gfx1151-x64.zip"
          ( cd "$artifact_dir" && zip -r "../../${archive}" * )
          ls -la ./*.zip

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
          LLAMACPP_REF: ${{ inputs.llamacpp_ref }}
          LLAMACPP_COMMIT_HASH: ${{ needs.build-ubuntu.outputs.llamacpp_commit_hash }}
          ROCM_VERSION: ${{ needs.build-ubuntu.outputs.rocm_version }}
        run: |
          archive="llama-${RELEASE_TAG}-ubuntu-rocm-gfx1151-x64.zip"
          notes=$(printf '%s\n' \
            "**Source**: chrismcmacken/llamacpp-strix-halo @ ${LLAMACPP_REF:-master} (${LLAMACPP_COMMIT_HASH})" \
            "**GPU Target**: gfx1151" \
            "**ROCm Version**: ${ROCM_VERSION}" \
            "**Build Date**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" \
            "" \
            "Self-contained llama.cpp + ROCm build (RPATH=\$ORIGIN, bundled ROCm runtime)," \
            "same package format as lemonade-sdk/llamacpp-rocm. Carries the gfx1151 prefill patch.")
          gh release create "$RELEASE_TAG" --repo "$GH_REPO" --title "$RELEASE_TAG" --notes "$notes" "$archive"
